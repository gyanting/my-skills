# ============================================================
# 二、真阳性 — 漏洞利用/真实攻击（需深度载荷分析确认）
# ============================================================
exploit_names:
  - name: "React组件RCE探测(CVE-2025-55182)"
    cve: "CVE-2025-55182"
    cvss: 10.0
    severity: "严重"
    payload_indicators:
      - "$1:__proto__:then"
      - "__proto__"
      - "constructor"
      - "Next-Action"
      - "X-Nextjs-Request-Id"
      - "multipart/form-data"
    analysis: "React Server Components反序列化RCE，CVSS 10.0，已在野利用"
    recommendation_level: "强烈建议"

  - name: "React组件远程代码执行攻击(CVE-2025-55182)"
    cve: "CVE-2025-55182"
    cvss: 10.0
    severity: "严重"
    payload_indicators:
      - "$1:__proto__:then"
      - "__proto__"
    analysis: "同上，已确认的RCE攻击尝试"
    recommendation_level: "强烈建议"

  - name: "D-Link UPnP SOAP命令执行攻击"
    cve: "CVE-2013-2670"
    cvss: 9.8
    severity: "严重"
    payload_indicators:
      - "soap.cgi"
      - "AddPortMapping"
      - "urn:schemas-upnp-org"
    analysis: "D-Link路由器UPnP SOAP接口命令注入，无需认证远程命令执行"
    recommendation_level: "建议"

  - name: "Apache HTTPD多后缀解析攻击或敏感文件扫描"
    cve: "CVE-2017-15715"
    cvss: 7.5
    severity: "高危"
    payload_indicators:
      - ".php."
      - ".jsp."
    analysis: "Apache多后缀解析绕过漏洞，可导致任意代码执行"
    recommendation_level: "建议"

  - name: "包含恶意链接:金蝉"
    severity: "高危"
    payload_indicators: []
    analysis: "金蝉是已知恶意软件家族，需重点排查"
    recommendation_level: "建议"

  - name: "MySQL空口令登录失败"
    severity: "中危"
    payload_indicators: []
    analysis: "空口令登录是明确的安全探测行为"
    recommendation_level: "建议"

  - name: "反向HTTP流量"
    severity: "高危"
    payload_indicators: []
    analysis: "可能是C2通信或数据外传通道，需重点排查"
    recommendation_level: "建议"

  - name: "Laravel Framework env配置文件敏感信息泄露攻击(CVE-2017-16894)"
    cve: "CVE-2017-16894"
    cvss: 7.5
    severity: "高危"
    payload_indicators:
      - ".env"
    analysis: "Laravel .env文件包含数据库密码、APP_KEY等敏感信息"
    recommendation_level: "建议"

# ============================================================
# 三、弱口令/认证类 — 中置信度真阳性
# ============================================================
weak_password_names:
  - name: "IMAP登录(弱口令)"
    protocol: "IMAP"
    severity: "中危"
    analysis: "IMAP邮件服务弱口令爆破，可能导致邮箱被控"
  - name: "SMTP登录(弱口令)"
    protocol: "SMTP"
    severity: "中危"
    analysis: "SMTP邮件服务弱口令爆破，可能被用于发送钓鱼邮件"
  - name: "FTP登录(弱口令)"
    protocol: "FTP"
    severity: "中危"
    analysis: "FTP弱口令登录可能导致文件泄露或篡改"
  - name: "SSH登录(弱口令)"
    protocol: "SSH"
    severity: "高危"
    analysis: "SSH弱口令登录可能导致服务器被完全控制"
  - name: "HTTP登录失败(弱口令)"
    protocol: "HTTP"
    severity: "中危"
    analysis: "Web应用弱口令登录尝试"
  - name: "登录行为(弱口令)"
    protocol: "通用"
    severity: "中危"
    analysis: "通用弱口令登录行为"

# ============================================================
# 四、中置信度判定规则 — 需载荷正反指标匹配
# ============================================================
medium_confidence_rules:

  # -- 文件传输 --
  - event_pattern: "文件传输行为"
    fp_indicators:
      - pattern: "windowsupdate\\.com"
        description: "Windows Update 系统更新下载"
      - pattern: "Microsoft-Delivery-Optimization"
        description: "Windows Delivery Optimization P2P更新"
      - pattern: "dl\\.delivery\\.mp\\.microsoft\\.com"
        description: "Microsoft Delivery Optimization CDN"
      - pattern: "updateleak\\.qihucdn\\.com"
        description: "360安全卫士/软件管家配置更新"
      - pattern: "/config/config\\.dat"
        description: "软件配置文件拉取"
      - pattern: "\\.exe\\?cacheHostOrigin="
        description: "微软更新缓存分发下载"
      - pattern: "\\.msi\\?cacheHostOrigin="
        description: "微软MSI安装包分发"
    attack_indicators:
      - pattern: "\\.php\\?"
        description: "PHP脚本文件传输"
      - pattern: "webshell|shell\\.(jsp|asp|aspx|php)"
        description: "可疑Webshell文件传输"
      - pattern: "/etc/(passwd|shadow)"
        description: "系统敏感文件传输"
      - pattern: "eval\\(|exec\\(|system\\("
        description: "命令执行痕迹"
    default_judgment: "business_noise"

  - event_pattern: "压缩文件传输"
    fp_indicators:
      - pattern: "windowsupdate\\.com"
        description: "Windows Update"
      - pattern: "Microsoft-Delivery-Optimization"
        description: "Windows DO"
    attack_indicators:
      - pattern: "\\.(zip|tar\\.gz|rar|7z).*\\?(?!cacheHostOrigin)"
        description: "可疑压缩包下载"
    default_judgment: "business_noise"

  # -- SSH --
  - event_pattern: "SSH连接"
    fp_indicators:
      - pattern: ".*"
        description: "SSH连接为运维管理基本手段，无暴力破解特征时视为正常"
    attack_indicators:
      - pattern: "root@"
        description: "以root用户SSH登录（配合暴力破解判定）"
      - pattern: "Failed password for"
        description: "SSH登录失败（需关联分析）"
    default_judgment: "business_noise"

  # -- 爬虫/扫描 --
  - event_pattern: "爬虫扫描行为"
    fp_indicators:
      - pattern: "(?i)(googlebot|baiduspider|bingbot|sogou|yandex|duckduckgo|slurp|facebookexternalhit|twitterbot)"
        description: "搜索引擎/社交媒体爬虫"
      - pattern: "(?i)Mozilla/5\\.0.*compatible.*(?:crawler|spider|bot)"
        description: "声明了爬虫身份的流量"
    attack_indicators:
      - pattern: "(?i)(sqlmap|nikto|acunetix|nessus|burpsuite|appscan|awvs|netsparker)"
        description: "已知安全扫描工具"
      - pattern: "(?i)(admin|wp-admin|phpmyadmin|manager|config)"
        description: "敏感路径扫描"
      - pattern: "(\\.git/|\\.env|\\.svn/|WEB-INF/|\\.DS_Store)"
        description: "敏感文件/目录扫描"
    default_judgment: "business_noise"

  # -- Friendly Scanner --
  - event_pattern: "Friendly-Scanner扫描器"
    fp_indicators:
      - pattern: ".*"
        description: "Friendly-Scanner是互联网常见的自动化扫描器，扫描目标随机"
    attack_indicators: []
    default_judgment: "false_positive"

  # -- 端口扫描 (同一端口多主机) --
  - event_pattern: "对不同主机的同一端口进行扫描"
    fp_indicators:
      - pattern: ".*"
        description: "互联网背景噪声，无后续漏洞利用时属正常背景辐射"
    attack_indicators:
      - pattern: ".*"
        description: "若同源IP后续产生漏洞利用告警则为真阳性"
    default_judgment: "false_positive"

  # -- 端口扫描 (单主机多端口) --
  - event_pattern: "对单一主机的多端口进行扫描"
    fp_indicators:
      - pattern: ".*"
        description: "若无后续漏洞利用，单次端口扫描可能是正常服务发现"
    attack_indicators:
      - pattern: ".*"
        description: "若伴随漏洞利用payload则为真阳性"
    default_judgment: "false_positive"

  # -- HID VertX --
  - event_pattern: "HID VertX控制器扫描"
    fp_indicators: []
    attack_indicators:
      - pattern: "discover;013;"
        description: "HID VertX设备发现协议命令"
      - pattern: "4070"
        description: "HID VertX默认端口"
    default_judgment: "true_positive"

  # -- Nmap扫描 --
  - event_pattern: "出现Nmap扫描"
    fp_indicators: []
    attack_indicators:
      - pattern: ".*"
        description: "Nmap是专业网络扫描工具，属攻击前侦察阶段"
    default_judgment: "true_positive"

  # -- 僵尸网络扫描 --
  - event_pattern: "僵尸网络扫描"
    fp_indicators:
      - pattern: ".*"
        description: "多数僵尸网络扫描告警为互联网背景噪声"
    attack_indicators:
      - pattern: "discover;013;|AddPortMapping|soap\\.cgi|/cgi-bin/"
        description: "伴随漏洞利用payload"
    default_judgment: "false_positive"

  # -- 敏感信息泄露 --
  - event_pattern: "敏感信息泄露"
    fp_indicators:
      - pattern: "(?i)\\.(css|js|png|jpg|jpeg|gif|svg|ico|woff|ttf|eot|woff2)"
        description: "静态资源请求"
      - pattern: "(?i)(text/html|application/xhtml).*(?:Firefox|Chrome|Safari|Edge)"
        description: "正常浏览器页面请求"
    attack_indicators:
      - pattern: "(?i)(password|passwd|secret|token|apikey|api_key|credential|Authorization)"
        description: "包含敏感关键词"
      - pattern: "(?i)\\.git/config|\\.env$|\\.aws/credentials|id_rsa"
        description: "敏感配置文件路径"
      - pattern: "(?i)\\.sql$|\\.bak$|\\.backup$|dump\\.sql|\\.tgz$"
        description: "数据库/源码备份文件"
    default_judgment: "manual_review"

  - event_pattern: "敏感信息泄露攻击"
    fp_indicators:
      - pattern: "(?i)\\.(css|js|png|jpg|jpeg|gif|svg|ico)"
        description: "静态资源请求被误判"
    attack_indicators:
      - pattern: "(?i)(\\.git|\\.svn|\\.env|backup|\\.bak|\\.sql|config\\.php|wp-config)"
        description: "敏感路径探测"
    default_judgment: "manual_review"

  # -- Basic Auth --
  - event_pattern: "Basic Authentication认证"
    fp_indicators:
      - pattern: ".*"
        description: "HTTP Basic Auth是标准认证协议，无暴力破解特征时属正常"
    attack_indicators:
      - pattern: "(?i)Authorization: Basic (?:YWRtaW46|dGVzdDp0ZXN0|cm9vdDpyb290|Z3Vlc3Q6Z3Vlc3Q|YWRtaW46YWRtaW4)"
        description: "使用常见默认凭据"
    default_judgment: "manual_review"

  # -- RDP --
  - event_pattern: "RDP连接"
    fp_indicators:
      - pattern: ".*"
        description: "RDP是Windows远程管理标准协议"
    attack_indicators:
      - pattern: ".*"
        description: "外部IP发起的RDP连接需重点关注"
    default_judgment: "manual_review"

  # -- Docker Registry --
  - event_pattern: "Docker Registry未授权访问"
    fp_indicators: []
    attack_indicators:
      - pattern: ".*"
        description: "Docker Registry未授权可导致镜像被篡改或拖取"
    default_judgment: "true_positive"

  # -- 文件读取 --
  - event_pattern: "文件读取攻击"
    fp_indicators: []
    attack_indicators:
      - pattern: "(?i)(/etc/passwd|/etc/shadow|win\\.ini|web\\.config|\\.\\./)"
        description: "路径遍历读取系统敏感文件"
    default_judgment: "true_positive"

