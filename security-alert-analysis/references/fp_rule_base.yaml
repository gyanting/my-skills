# ============================================================
# 微步告警误报判定规则库 v2
# ============================================================
# 用途：compare_alerts.py 加载此配置进行批量 FP 判定
# 维护：新增规则直接追加，无需改 Python 代码
# 格式：每类规则含 name + patterns + reason

# ============================================================
