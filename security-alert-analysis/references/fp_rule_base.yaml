# ============================================================
# 六、攻击特征库（扩展版）
# ============================================================
attack_features:
  sql_injection:
    patterns:
      - "UNION SELECT"
      - " OR 1=1"
      - "' OR '"
      - "\" OR \""
      - "DROP TABLE"
      - "INSERT INTO"
      - "UPDATE SET"
      - "DELETE FROM"
      - "information_schema"
      - "SLEEP("
      - "BENCHMARK("
      - "WAITFOR DELAY"
      - "pg_sleep"
      - "xp_cmdshell"
      - "LOAD_FILE"
      - "INTO OUTFILE"
      - "CHAR("
      - "CONCAT("
      - "GROUP_CONCAT"
      - "0x[0-9a-fA-F]{8,}"

  xss:
    patterns:
      - "<script"
      - "javascript:"
      - "onerror="
      - "onload="
      - "onclick="
      - "onmouseover="
      - "onfocus="
      - "onblur="
      - "alert("
      - "prompt("
      - "confirm("
      - "document\\.cookie"
      - "document\\.write"
      - "eval\\(.*\\)"
      - "<img.*onerror"
      - "<svg.*onload"
      - "String\\.fromCharCode"

  rce:
    patterns:
      - ";cat "
      - ";ls "
      - ";id"
      - ";whoami"
      - ";uname"
      - ";pwd"
      - ";wget "
      - ";curl "
      - "|cat "
      - "|ls "
      - "|id"
      - "`id`"
      - "$(whoami)"
      - "eval("
      - "exec("
      - "system("
      - "passthru("
      - "shell_exec("
      - "popen("
      - "proc_open("
      - "Runtime\\.getRuntime"
      - "ProcessBuilder"
      - "cmd\\.exe"
      - "/bin/bash"
      - "/bin/sh"
      - "__proto__"
      - "constructor"

  path_traversal:
    patterns:
      - "../"
      - "..%2f"
      - "..%5c"
      - "%2e%2e"
      - "/etc/passwd"
      - "/etc/shadow"
      - "/windows/win.ini"
      - "C:\\\\Windows"
      - "..\\\\"
      - "....//"
      - "....\\\\"
      - "file:///"
      - "WEB-INF/web\\.xml"
      - "\\.git/HEAD"
      - "\\.env"

  ssrf:
    patterns:
      - "127\\.0\\.0\\.1"
      - "localhost"
      - "0\\.0\\.0\\.0"
      - "169\\.254\\.169\\.254"
      - "metadata\\.google\\.internal"
      - "file://"
      - "gopher://"
      - "dict://"
      - "internal\\.\\w+\\.com"

  csrf:
    patterns:
      - "<form.*action.*http"
      - "XMLHttpRequest"
      - "fetch\\("
      - "Content-Type: application/x-www-form-urlencoded"

# ============================================================
# 七、编码绕过检测配置
# ============================================================
encoding_detection:
  max_depth: 3  # 最多递归解码层数
  encodings:
    - type: "URL编码"
      priority: 1
      detection_pattern: "%[0-9A-Fa-f]{2}"
      decoder: "urldecode"
    - type: "Hex编码"
      priority: 2
      detection_pattern: "\\\\x[0-9A-Fa-f]{2}"
      decoder: "hex_decode"
    - type: "Unicode编码"
      priority: 3
      detection_pattern: "\\\\u[0-9A-Fa-f]{4}"
      decoder: "unicode_decode"
    - type: "Base64编码"
      priority: 4
      detection_pattern: "^[A-Za-z0-9+/]+=*$"
      decoder: "base64_decode"
      min_length: 4
      require_multiple_of_4: true
    - type: "HTML实体编码"
      priority: 5
      detection_pattern: "&#\\d+;|&#x[0-9A-Fa-f]+;"
      decoder: "html_entity_decode"
    - type: "双重URL编码"
      priority: 6
      detection_pattern: "%25[0-9A-Fa-f]{2}"
      decoder: "double_urldecode"
